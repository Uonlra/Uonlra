name: Metrics

on:
  schedule:
    # 每天 UTC 00:00 执行（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  # 按分支隔离并发，避免不同分支互相取消
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  metrics-write:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # 1) Isometric commit calendar（全年）
      - name: Metrics - Isometric commit calendar
        uses: lowlighter/metrics@v3.34
        with:
          user: Uonlra
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics-isocalendar.svg

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2) Languages activity（单独文件输出）
      - name: Metrics - Languages activity
        uses: lowlighter/metrics@v3.34
        with:
          user: Uonlra
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics-languages.svg

          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_indepth: no
          plugin_languages_analysis_timeout: 30
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 30

  metrics-preview:
    if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1) Isometric commit calendar（预览，不写回仓库）
      - name: Metrics - Isometric commit calendar (dry-run)
        uses: lowlighter/metrics@v3.34
        with:
          user: Uonlra
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics-isocalendar.svg
          dryrun: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2) Languages activity（预览，不写回仓库）
      - name: Metrics - Languages activity (dry-run)
        uses: lowlighter/metrics@v3.34
        with:
          user: Uonlra
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: metrics-languages.svg
          dryrun: yes

          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_indepth: no
          plugin_languages_analysis_timeout: 30
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 30
